name: Simple CI

on:
  workflow_call:
    inputs:
      package-manager:
        description: Package manager to use (npm, pnpm, bun)
        required: false
        type: string
        default: npm
      node-version:
        description: Node.js version to use
        required: false
        type: string
        default: '24'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        uses: ./.github/actions/setup
        with:
          package-manager: ${{ inputs.package-manager }}
          node-version: ${{ inputs.node-version }}

      - name: Install
        uses: ./.github/actions/install-dependencies
        with:
          package-manager: ${{ inputs.package-manager }}

      - name: Build
        shell: bash
        run: ${{ inputs.package-manager }} run build

      - name: Check
        shell: bash
        run: ${{ inputs.package-manager }} run check

      - name: Test
        shell: bash
        run: ${{ inputs.package-manager }} run test
