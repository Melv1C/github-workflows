name: Production Deploy

on:
  workflow_call:
    inputs:
      app-name:
        description: Application name to deploy
        required: false
        type: string
        default: ''
      image-name-prefix:
        description: Optional prefix for image names (prefix-app)
        required: false
        type: string
        default: ''
    secrets:
      dockerhub-username:
        required: true
      dockerhub-token:
        required: true
  push:
    tags:
      - '*@*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy parameters
        id: params
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_NAME: ${{ github.ref_name }}
          INPUT_APP_NAME: ${{ inputs.app-name }}
          IMAGE_NAME_PREFIX: ${{ inputs.image-name-prefix }}
        run: |
          set -euo pipefail

          tag_name="$TAG_NAME"
          tagged_app_name="${tag_name%@*}"
          version="${tag_name#*@}"

          if [[ -z "$tagged_app_name" || -z "$version" || "$tag_name" == "$tagged_app_name" ]]; then
            echo "Malformed tag '$tag_name'. Expected format app-name@version."
            exit 1
          fi

          app_name="$tagged_app_name"
          if [[ -n "$INPUT_APP_NAME" ]]; then
            app_name="$INPUT_APP_NAME"
          fi

          if [[ "$EVENT_NAME" == "workflow_call" && -n "$INPUT_APP_NAME" && "$INPUT_APP_NAME" != "$tagged_app_name" ]]; then
              echo "Provided app-name '$INPUT_APP_NAME' does not match tag app '$tagged_app_name'."
              exit 1
          fi

          if [[ -z "$app_name" ]]; then
            echo "Missing app name. Provide app-name or push a valid tag in the format app-name@version."
            exit 1
          fi

          semver_regex='^[0-9]+\.[0-9]+\.[0-9]+(\+[0-9A-Za-z.-]+)?$'
          if [[ ! "$version" =~ $semver_regex ]]; then
            echo "Malformed version '$version'. Expected stable semantic version only (for example 1.2.3). Pre-release versions (alpha, beta, rc, etc.) are not allowed."
            exit 1
          fi

          image_name="$app_name"

          if [[ -n "$IMAGE_NAME_PREFIX" ]]; then
            image_name="${IMAGE_NAME_PREFIX}-${app_name}"
          fi

          echo "app-name=$app_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image-name=$image_name" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: ./.github/actions/docker-deploy
        with:
          app-name: ${{ steps.params.outputs.app-name }}
          context: .
          dockerfile: apps/${{ steps.params.outputs.app-name }}/Dockerfile
          version: ${{ steps.params.outputs.version }}
          image-name: ${{ steps.params.outputs.image-name }}
          dockerhub-username: ${{ secrets.dockerhub-username }}
          dockerhub-token: ${{ secrets.dockerhub-token }}
