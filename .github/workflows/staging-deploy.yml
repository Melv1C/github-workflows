name: Staging Deploy

on:
  workflow_call:
    inputs:
      apps:
        description: JSON array of apps to deploy (for example ["backend","frontend"])
        required: true
        type: string
      image-name-prefix:
        description: Optional prefix for image names (prefix-app)
        required: false
        type: string
        default: ''
    secrets:
      dockerhub-username:
        required: true
      dockerhub-token:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(inputs.apps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: params
        shell: bash
        env:
          APP_NAME: ${{ matrix.app }}
          IMAGE_NAME_PREFIX: ${{ inputs.image-name-prefix }}
        run: |
          set -euo pipefail

          image_name="$APP_NAME"

          if [[ -n "$IMAGE_NAME_PREFIX" ]]; then
            image_name="${IMAGE_NAME_PREFIX}-${APP_NAME}"
          fi

          echo "image-name=$image_name" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: melv1c/github-workflows/.github/actions/docker-deploy@main
        with:
          app-name: ${{ matrix.app }}
          context: .
          dockerfile: apps/${{ matrix.app }}/Dockerfile
          tag: staging
          image-name: ${{ steps.params.outputs.image-name }}
          dockerhub-username: ${{ secrets.dockerhub-username }}
          dockerhub-token: ${{ secrets.dockerhub-token }}
